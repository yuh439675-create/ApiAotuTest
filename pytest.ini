[pytest]
# 只收集 Test_Case 目录下的用例，不收集 Utils 等目录
testpaths = Test_Case

python_files = test_*
python_classes = Test*
python_functions = test_*

markers =
    smoke : 冒烟测试
    regression : 回归测试
    login : 登录模块
    slow : 慢速测试

# 默认参数
#   -v           详细输出
#   --tb=short   简短 traceback
#   -x           首个失败即停（可用 --no-header 覆盖）
addopts = -v --tb=short

# 慢用例告警阈值（秒）
faulthandler_timeout = 60

# 日志 - 控制台
log_cli = 1
log_cli_level = INFO
log_cli_date_format = %Y-%m-%d %H:%M:%S
log_cli_format = %(asctime)s | %(levelname)-7s | %(name)s:%(lineno)d | %(message)s

# 日志 - 文件
log_file = Logs/allure.log
log_file_level = DEBUG
log_file_date_format = %Y-%m-%d %H:%M:%S
log_file_format = %(asctime)s | %(levelname)-7s | %(name)s:%(lineno)d | %(message)s
