# 数据驱动测试用例数据
# 每条数据代表一个测试场景

- case_name: "登录接口-正常请求"
  method: POST
  path: "sqx_fast/app/Login/emailLogin"
  content-type: application/json
  username: 1@qq.com
  password: 123456
  expect_status: 200

- case_name: "登录接口-缺少密码参数"
  method: POST
  path: "sqx_fast/app/Login/emailLogin"
  content-type: application/json
  username: 1@qq.com
  expect_status: 200

- case_name: "登录接口-账号为空"
  method: POST
  path: "sqx_fast/app/Login/emailLogin"
  content-type: application/json
  username:
  password: 123456
  expect_status: 200

- case_name: "登录接口-密码为空"
  method: POST
  path: "sqx_fast/app/Login/emailLogin"
  content-type: application/json
  username: 1@qq.com
  password:
  expect_status: 200
